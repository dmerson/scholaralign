<mat-toolbar color="primary">
  <a routerLink="/" mat-button class="brand">
    <mat-icon>school</mat-icon>
    ScholarAlign
  </a>

  <span class="spacer"></span>

  @if (auth.isAuthenticated()) {
    <a routerLink="/dashboard" mat-button routerLinkActive="active-link">Dashboard</a>
    <a routerLink="/scholarships" mat-button routerLinkActive="active-link">My Answers</a>
    <a routerLink="/applications" mat-button routerLinkActive="active-link">Applications</a>
    <a routerLink="/reviewer" mat-button routerLinkActive="active-link">Reviewer</a>

    <button mat-button [matMenuTriggerFor]="orgAdminMenu">
      Org Admin <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #orgAdminMenu="matMenu">
      <a mat-menu-item routerLink="/org-admin/award-years">Award Years</a>
      <a mat-menu-item routerLink="/org-admin/users-roles">Users &amp; Roles</a>
      <a mat-menu-item routerLink="/org-admin/hierarchy">Organization Hierarchy</a>
      <a mat-menu-item routerLink="/org-admin/committees">Assign Committees</a>
      <a mat-menu-item routerLink="/org-admin/scholarships">Scholarships</a>
      <a mat-menu-item routerLink="/org-admin/award-scholarships">Award Scholarships</a>
    </mat-menu>

    <button mat-button [matMenuTriggerFor]="publicAdminMenu">
      Public Admin <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #publicAdminMenu="matMenu">
      <a mat-menu-item routerLink="/public-admin/questions">Questions</a>
      <a mat-menu-item routerLink="/public-admin/award-years">Award Years</a>
      <a mat-menu-item routerLink="/public-admin/scholarships">Public Scholarships</a>
      <a mat-menu-item routerLink="/public-admin/organizations">Organizations</a>
      <a mat-menu-item routerLink="/public-admin/suborganizations">Suborganizations</a>
    </mat-menu>

    <button mat-button [matMenuTriggerFor]="userMenu" class="user-btn">
      <mat-icon>account_circle</mat-icon>
      <span class="user-email">{{ auth.user()?.email }}</span>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        Sign out
      </button>
    </mat-menu>
  } @else {
    <a routerLink="/login" mat-button>Sign In</a>
  }
</mat-toolbar>

<main class="content">
  <router-outlet />
</main>
